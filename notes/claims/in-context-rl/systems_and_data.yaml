topic: in-context-rl
claim_family: systems_and_data
claims:
  - claim_id: icrl-systems-001
    statement: "Long-context adaptation remains a systems bottleneck in the local corpus, and multiple papers attack it through cheaper memory backbones, partial updates, or attention-kernel engineering."
    type: evidence
    support_note_files:
      - notes/papers/relic-a-recipe-for-64k-steps-of-in-context-reinforcement-learning-for-embodied-ai.md
      - notes/papers/decision-mamba-reinforcement-learning-via-hybrid-selective-sequence-modeling.md
      - notes/papers/structured-state-space-models-for-in-context-reinforcement-learning.md
      - notes/papers/xlstm-extended-long-short-term-memory.md
      - notes/papers/flashattention-2-faster-attention-with-better-parallelism-and-work-partitioning.md
    evidence_anchors:
      - note_file: notes/papers/relic-a-recipe-for-64k-steps-of-in-context-reinforcement-learning-for-embodied-ai.md
        anchors: [Training with 64k Context Length, Sink KV, Conclusion and Limitations]
      - note_file: notes/papers/decision-mamba-reinforcement-learning-via-hybrid-selective-sequence-modeling.md
        anchors: [Decision Mamba-Hybrid, Experiments]
      - note_file: notes/papers/structured-state-space-models-for-in-context-reinforcement-learning.md
        anchors: [Method, Experiments]
      - note_file: notes/papers/xlstm-extended-long-short-term-memory.md
        anchors: [xLSTM Architecture, Memory and Speed Considerations]
      - note_file: notes/papers/flashattention-2-faster-attention-with-better-parallelism-and-work-partitioning.md
        anchors: [Hardware Performance, Standard Attention Implementation]
    confidence: 0.90
    downstream_use_candidates: [systems-design, compute-justification, architecture-section]

  - claim_id: icrl-systems-002
    statement: "Increasing task diversity or dataset scale helps coverage and asymptotic capability in local notes, but often introduces slower adaptation or exposes new generalization limits."
    type: inference
    support_note_files:
      - notes/papers/xland-100b-a-large-scale-multi-task-dataset-for-in-context-reinforcement-learning.md
      - notes/papers/omnirl-in-context-reinforcement-learning-by-large-scale-meta-training-in-randomized-worlds.md
      - notes/papers/human-timescale-adaptation-in-an-open-ended-task-space.md
    evidence_anchors:
      - note_file: notes/papers/xland-100b-a-large-scale-multi-task-dataset-for-in-context-reinforcement-learning.md
        anchors: [Experiments, Limitations and Future Work, Additional experiments on number of tasks]
      - note_file: notes/papers/omnirl-in-context-reinforcement-learning-by-large-scale-meta-training-in-randomized-worlds.md
        anchors: [Demonstration of Generalization and Scalability, Emergence of General-Purpose ICRL by Increasing Task Number, Conclusions and Discussions]
      - note_file: notes/papers/human-timescale-adaptation-in-an-open-ended-task-space.md
        anchors: [Scaling the task pool increases performance, Scaling the complexity of the task pool, Computational cost]
    confidence: 0.84
    downstream_use_candidates: [dataset-choice, risk-section, scaling-argument]

